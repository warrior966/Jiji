<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Restaurante Firebase</title>
    <style>
        :root {
            --primary: #e67e22;
            --success-color: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f5f6fa; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: var(--dark); margin-top: 0; border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        /* Selectores y Formularios */
        .card { background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid var(--primary); box-sizing: border-box; }
        .card-success { border-left-color: var(--success-color); }
        h3 { margin-top: 0; color: var(--dark); }
        
        label { font-weight: bold; display: block; margin-bottom: 5px; color: var(--dark); }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; width: 100%; }
        button:hover { background: #d35400; }
        .btn-success { background: var(--success-color); }
        .btn-success:hover { background: #27ae60; }

        /* Estado */
        #status { padding: 10px 15px; border-radius: 6px; margin-top: 20px; font-weight: 500; font-size: 14px; display: block; text-align: center; }
        .loading { background: #ffeaa7; color: #d63031; }
        .success { background: #55efc4; color: #00b894; }
        .error { background: #ff7675; color: white; }

        /* Tabla de Datos */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--light); }
        th { background-color: var(--dark); color: white; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }
        
        .no-data { text-align: center; padding: 40px; color: #7f8c8d; font-style: italic; }
        pre { margin: 0; font-family: monospace; background: #f1f2f6; padding: 5px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍽️ Panel de Control Activo: restaurante-ce3c8</h1>
    
    <div class="grid">
        <div class="card">
            <h3>Navegar / Cambiar Base de Datos</h3>
            <label for="collectionName">Colección (Tabla):</label>
            <input type="text" id="collectionName" value="menu" placeholder="Ej: menu, pedidos, productos...">
            <button id="btnCambiar">Ver / Cambiar Colección</button>
        </div>

        <div class="card card-success">
            <h3>Agregar Nuevo Registro</h3>
            <label for="documentData">Datos en formato JSON (Ej: {"nombre": "Tacos", "precio": 150}):</label>
            <textarea id="documentData" rows="3" placeholder='{"nombre": "Platillo Ejemplo", "precio": 12.50, "disponible": true}'></textarea>
            <button id="btnGuardar" class="btn-success">Guardar en Firebase</button>
        </div>
    </div>

    <div id="status" class="loading">Conectando con Firebase...</div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr id="tableHeaders">
                    <th>ID del Documento</th>
                    <th>Datos actuales en la nube</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="2" class="no-data">Cargando datos...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCI2Prwq-gjnEHga1PA5wbE3j5xmPQtKpg",
        authDomain: "restaurante-ce3c8.firebaseapp.com",
        projectId: "restaurante-ce3c8",
        storageBucket: "restaurante-ce3c8.firebasestorage.app",
        messagingSenderId: "303314247342",
        appId: "1:303314247342:web:cc05d4360d46b3ad02173f"
    };

    let db;
    let coleccionActual = "menu";

    // Inicializar
    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        updateStatus("Conectado a Firebase correctamente.", "success");
        cargarColeccion(coleccionActual);
    } catch (e) {
        updateStatus("Error de conexión: " + e.message, "error");
    }

    // Botón Cambiar Colección
    document.getElementById("btnCambiar").addEventListener("click", () => {
        const coleccion = document.getElementById("collectionName").value.trim();
        if (coleccion) {
            coleccionActual = coleccion;
            cargarColeccion(coleccionActual);
        }
    });

    // Botón Guardar / Agregar Datos
    document.getElementById("btnGuardar").addEventListener("click", async () => {
        const jsonTexto = document.getElementById("documentData").value.trim();
        
        if (!jsonTexto) {
            alert("Por favor, escribe los datos que quieres guardar.");
            return;
        }

        try {
            // Convertir el texto escrito a un objeto JSON real
            const objetoAGuardar = JSON.parse(jsonTexto);
            
            updateStatus("Guardando datos en Firebase...", "loading");
            
            // Guardar en la colección que esté seleccionada actualmente
            await addDoc(collection(db, coleccionActual), objetoAGuardar);
            
            updateStatus("¡Datos guardados con éxito en la nube!", "success");
            document.getElementById("documentData").value = ""; // Limpiar el cuadro
            
            // Recargar la tabla automáticamente para ver el cambio
            cargarColeccion(coleccionActual);

        } catch (error) {
            console.error(error);
            if (error instanceof SyntaxError) {
                alert("Error de formato: Asegúrate de escribir un JSON válido.\nEjemplo: {\"nombre\": \"Agua\", \"precio\": 2.50}");
                updateStatus("Error en el formato de los datos escritos.", "error");
            } else {
                updateStatus("Error al guardar: " + error.message, "error");
            }
        }
    });

    // Leer Datos
    async function cargarColeccion(nombreColeccion) {
        const tableBody = document.getElementById("tableBody");
        try {
            const querySnapshot = await getDocs(collection(db, nombreColeccion));
            tableBody.innerHTML = "";
            
            if (querySnapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="2" class="no-data">La colección "${nombreColeccion}" está vacía o no existe todavía. ¡Puedes estrenarla agregando datos a la derecha!</td></tr>`;
                return;
            }

            querySnapshot.forEach((doc) => {
                const fila = document.createElement("tr");
                fila.innerHTML = `
                    <td><strong>${doc.id}</strong></td>
                    <td><pre>${JSON.stringify(doc.data(), null, 2)}</pre></td>
                `;
                tableBody.appendChild(fila);
            });
            updateStatus(`Viendo colección: "${nombreColeccion}"`, "success");
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="2" class="no-data">Error de permisos o conexión.</td></tr>`;
            updateStatus("Error: " + error.message, "error");
        }
    }

    function updateStatus(texto, clase) {
        const statusDiv = document.getElementById("status");
        statusDiv.innerText = texto;
        statusDiv.className = clase;
    }
</script>
</body>
</html>
