<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor en Vivo - Restaurante Firebase</title>
    <style>
        :root {
            --primary: #e67e22;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f5f6fa; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: var(--dark); margin-top: 0; border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid var(--primary); box-sizing: border-box; }
        .card-success { border-left-color: var(--success-color); }
        h3 { margin-top: 0; color: var(--dark); }
        
        label { font-weight: bold; display: block; margin-bottom: 5px; color: var(--dark); }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        
        button { color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-primary { background: var(--primary); width: 100%; }
        .btn-success { background: var(--success-color); width: 100%; }
        
        /* Botones de la tabla */
        .btn-table-save { background: #3498db; padding: 6px 12px; font-size: 12px; margin-right: 5px; }
        .btn-table-delete { background: var(--danger-color); padding: 6px 12px; font-size: 12px; }

        #status { padding: 10px 15px; border-radius: 6px; margin-top: 20px; font-weight: 500; font-size: 14px; display: block; text-align: center; }
        .loading { background: #ffeaa7; color: #d63031; }
        .success { background: #55efc4; color: #00b894; }
        .error { background: #ff7675; color: white; }

        /* Tabla */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--light); vertical-align: middle; }
        th { background-color: var(--dark); color: white; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }
        
        .no-data { text-align: center; padding: 40px; color: #7f8c8d; font-style: italic; }
        .edit-area { font-family: monospace; font-size: 13px; height: 60px; margin-bottom: 0; resize: vertical; box-sizing: border-box; padding: 5px; border: 1px solid #ccc; border-radius: 4px; width: 100%; }
        .id-input { font-family: monospace; font-size: 13px; font-weight: bold; padding: 6px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍽️ Editor de Base de Datos En Vivo: restaurante-ce3c8</h1>
    
    <div class="grid">
        <div class="card">
            <h3>Navegar Base de Datos</h3>
            <label for="collectionName">Colección (Tabla) a editar:</label>
            <input type="text" id="collectionName" value="usuarios" placeholder="Ej: menu, pedidos, productos...">
            <button id="btnCambiar" class="btn-primary">Cargar Colección</button>
        </div>

        <div class="card card-success">
            <h3>Crear Nuevo Registro</h3>
            <label for="documentData">Datos en formato JSON:</label>
            <textarea id="documentData" rows="3" placeholder='{"nombre": "Platillo", "precio": 10}'></textarea>
            <button id="btnGuardar" class="btn-success">Guardar en Firebase</button>
        </div>
    </div>

    <div id="status" class="loading">Conectando con Firebase...</div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">ID del Documento (Modificable)</th>
                    <th style="width: 50%;">Datos (JSON Modificable)</th>
                    <th style="width: 20%;">Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="3" class="no-data">Cargando datos...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCI2Prwq-gjnEHga1PA5wbE3j5xmPQtKpg",
        authDomain: "restaurante-ce3c8.firebaseapp.com",
        projectId: "restaurante-ce3c8",
        storageBucket: "restaurante-ce3c8.firebasestorage.app",
        messagingSenderId: "303314247342",
        appId: "1:303314247342:web:cc05d4360d46b3ad02173f"
    };

    let db;
    let coleccionActual = "usuarios";

    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        updateStatus("Conectado a Firebase correctamente.", "success");
        cargarColeccion(coleccionActual);
    } catch (e) {
        updateStatus("Error de conexión: " + e.message, "error");
    }

    // Cambiar de colección
    document.getElementById("btnCambiar").addEventListener("click", () => {
        const coleccion = document.getElementById("collectionName").value.trim();
        if (coleccion) {
            coleccionActual = coleccion;
            cargarColeccion(coleccionActual);
        }
    });

    // Guardar nuevo registro
    document.getElementById("btnGuardar").addEventListener("click", async () => {
        const jsonTexto = document.getElementById("documentData").value.trim();
        if (!jsonTexto) return alert("Escribe datos válidos.");
        try {
            const objeto = JSON.parse(jsonTexto);
            updateStatus("Guardando nuevo registro...", "loading");
            await addDoc(collection(db, coleccionActual), objeto);
            updateStatus("¡Registro creado!", "success");
            document.getElementById("documentData").value = "";
            cargarColeccion(coleccionActual);
        } catch (error) {
            alert("JSON inválido o error de Firebase: " + error.message);
        }
    });

    // Leer y renderizar tabla editable
    async function cargarColeccion(nombreColeccion) {
        const tableBody = document.getElementById("tableBody");
        try {
            const querySnapshot = await getDocs(collection(db, nombreColeccion));
            tableBody.innerHTML = "";
            
            if (querySnapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="3" class="no-data">La colección está vacía.</td></tr>`;
                return;
            }

            querySnapshot.forEach((documento) => {
                const idDoc = documento.id;
                const datosDoc = documento.data();
                
                const fila = document.createElement("tr");

                // Columna 1: ID en un input editable
                const tdId = document.createElement("td");
                const inputId = document.createElement("input");
                inputId.type = "text";
                inputId.className = "id-input";
                inputId.value = idDoc;
                inputId.id = `id-${idDoc}`;
                tdId.appendChild(inputId);
                fila.appendChild(tdId);

                // Columna 2: Textarea editable con el contenido JSON
                const tdDatos = document.createElement("td");
                const textarea = document.createElement("textarea");
                textarea.className = "edit-area";
                textarea.value = JSON.stringify(datosDoc, null, 2);
                textarea.id = `text-${idDoc}`;
                tdDatos.appendChild(textarea);
                fila.appendChild(tdDatos);

                // Columna 3: Botones de Acción (Guardar Cambios / Eliminar)
                const tdAcciones = document.createElement("td");
                
                const btnActualizar = document.createElement("button");
                btnActualizar.className = "btn-table-save";
                btnActualizar.innerText = "Actualizar";
                btnActualizar.onclick = () => actualizarRegistro(idDoc);
                
                const btnEliminar = document.createElement("button");
                btnEliminar.className = "btn-table-delete";
                btnEliminar.innerText = "Eliminar";
                btnEliminar.onclick = () => eliminarRegistro(idDoc);

                tdAcciones.appendChild(btnActualizar);
                tdAcciones.appendChild(btnEliminar);
                fila.appendChild(tdAcciones);

                tableBody.appendChild(fila);
            });
            updateStatus(`Viendo y editando: "${nombreColeccion}"`, "success");
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="3" class="no-data">Error de permisos.</td></tr>`;
            updateStatus("Error: " + error.message, "error");
        }
    }

    // FUNCIÓN PARA ACTUALIZAR DATOS E ID
    async function actualizarRegistro(idViejo) {
        const nuevoId = document.getElementById(`id-${idViejo}`).value.trim();
        const nuevoTextoJson = document.getElementById(`text-${idViejo}`).value;
        
        if (!nuevoId) return alert("El ID del documento no puede estar vacío.");

        try {
            const nuevoObjeto = JSON.parse(nuevoTextoJson);
            updateStatus("Procesando cambios en Firebase...", "loading");
            
            // Caso 1: El usuario cambió el ID del documento
            if (nuevoId !== idViejo) {
                updateStatus("Clonando documento en el nuevo ID...", "loading");
                
                // 1. Escribir los datos en la nueva ubicación (Nuevo ID)
                const nuevoDocRef = doc(db, coleccionActual, nuevoId);
                await setDoc(nuevoDocRef, nuevoObjeto);
                
                updateStatus("Eliminando ID antiguo...", "loading");
                
                // 2. Eliminar el documento con el ID viejo
                const viejoDocRef = doc(db, coleccionActual, idViejo);
                await deleteDoc(viejoDocRef);
                
                updateStatus("¡ID y datos modificados con éxito!", "success");
                
                // Recargar toda la tabla para actualizar las referencias internas del HTML
                cargarColeccion(coleccionActual);
            } 
            // Caso 2: Solo se modificó el JSON, el ID se quedó igual
            else {
                const docRef = doc(db, coleccionActual, idViejo);
                await setDoc(docRef, nuevoObjeto); // setDoc sobreescribe todo el contenido de forma limpia
                updateStatus("¡Registro modificado con éxito en la nube!", "success");
            }

        } catch (error) {
            alert("Error: Asegúrate de que el JSON modificado sea válido.\n" + error.message);
            updateStatus("Error al actualizar.", "error");
        }
    }

    // FUNCIÓN PARA ELIMINAR UN REGISTRO
    async function eliminarRegistro(idDoc) {
        if (!confirm("¿Seguro que quieres eliminar este registro permanentemente?")) return;
        try {
            updateStatus("Eliminando de la nube...", "loading");
            const docRef = doc(db, coleccionActual, idDoc);
            await deleteDoc(docRef);
            updateStatus("Registro eliminado.", "success");
            cargarColeccion(coleccionActual);
        } catch (error) {
            updateStatus("Error al eliminar: " + error.message, "error");
        }
    }

    function updateStatus(texto, clase) {
        const statusDiv = document.getElementById("status");
        statusDiv.innerText = texto;
        statusDiv.className = clase;
    }
</script>
</body>
</html>
