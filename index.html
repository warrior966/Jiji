<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Maestro - Restaurante Firebase</title>
    <style>
        :root {
            --primary: #e67e22;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f5f6fa; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: var(--dark); margin-top: 0; border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 5px solid var(--primary); box-sizing: border-box; }
        .card-success { border-left-color: var(--success-color); }
        h3 { margin-top: 0; color: var(--dark); }
        
        label { font-weight: bold; display: block; margin-bottom: 5px; color: var(--dark); font-size: 14px; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; }
        
        button { color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-primary { background: var(--primary); width: 100%; }
        .btn-success { background: var(--success-color); width: 100%; }
        
        .btn-table-save { background: #3498db; padding: 6px 12px; font-size: 12px; margin-right: 5px; }
        .btn-table-delete { background: var(--danger-color); padding: 6px 12px; font-size: 12px; }

        #status { padding: 10px 15px; border-radius: 6px; margin-top: 20px; font-weight: 500; font-size: 14px; display: block; text-align: center; }
        .loading { background: #ffeaa7; color: #d63031; }
        .success { background: #55efc4; color: #00b894; }
        .error { background: #ff7675; color: white; }

        /* Tabla Estructurada */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--light); vertical-align: middle; }
        th { background-color: var(--dark); color: white; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }
        
        .no-data { text-align: center; padding: 40px; color: #7f8c8d; font-style: italic; }
        .row-input { font-family: monospace; font-size: 13px; padding: 6px; margin-bottom: 0; width: 100%; height: 70px; resize: vertical;}
    </style>
</head>
<body>

<div class="container">
    <h1>🍽️ Panel de Control Definitivo: restaurante-ce3c8</h1>
    
    <div class="grid">
        <div class="card">
            <h3>Navegar Colecciones</h3>
            <label for="collectionName">Colección a editar (Prueba con "usuarios"):</label>
            <input type="text" id="collectionName" value="usuarios" placeholder="Ej: usuarios, pedidos, menu...">
            <button id="btnCambiar" class="btn-primary">Cargar Tabla</button>
        </div>

        <div class="card card-success">
            <h3>Restaurar Usuario (Con el localId de la API)</h3>
            
            <label for="customDocId">ID del Documento (Pega aquí el localId obtenido):</label>
            <input type="text" id="customDocId" placeholder="Ej: U3Y1bXpRdEtwZ0NJMlByd3Et...">
            
            <label for="documentData">Campos del Usuario en JSON:</label>
            <textarea id="documentData" rows="3" placeholder='{"nombre": "Juan Pérez", "correo": "juan@gmail.com", "rol": "cliente"}'></textarea>
            
            <button id="btnGuardar" class="btn-success">Recrear Usuario en la Nube</button>
        </div>
    </div>

    <div id="status" class="loading">Conectando con Firebase...</div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">ID del Usuario (UID)</th>
                    <th style="width: 50%;">Contenido del Perfil (JSON Modificable)</th>
                    <th style="width: 20%;">Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="3" class="no-data">Cargando datos...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCI2Prwq-gjnEHga1PA5wbE3j5xmPQtKpg",
        authDomain: "restaurante-ce3c8.firebaseapp.com",
        projectId: "restaurante-ce3c8",
        storageBucket: "restaurante-ce3c8.firebasestorage.app",
        messagingSenderId: "303314247342",
        appId: "1:303314247342:web:cc05d4360d46b3ad02173f"
    };

    let db;
    let coleccionActual = "usuarios";

    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        updateStatus("Conectado a Firebase correctamente.", "success");
        cargarColeccion(coleccionActual);
    } catch (e) {
        updateStatus("Error de conexión: " + e.message, "error");
    }

    document.getElementById("btnCambiar").addEventListener("click", () => {
        const coleccion = document.getElementById("collectionName").value.trim();
        if (coleccion) {
            coleccionActual = coleccion;
            cargarColeccion(coleccionActual);
        }
    });

    // GUARDAR O RECREAR UN USUARIO CON SU ID PERSONALIZADO (localId)
    document.getElementById("btnGuardar").addEventListener("click", async () => {
        const customId = document.getElementById("customDocId").value.trim();
        const jsonTexto = document.getElementById("documentData").value.trim();
        
        if (!customId || !jsonTexto) {
            return alert("Por favor rellenar tanto el ID (localId) como los Datos del usuario.");
        }

        try {
            const objetoDatos = JSON.parse(jsonTexto);
            updateStatus("Inyectando usuario en Firestore...", "loading");
            
            // Usamos setDoc en lugar de addDoc para poder asignarle nosotros mismos el ID que queremos
            await setDoc(doc(db, coleccionActual, customId), objetoDatos);
            
            updateStatus("¡Usuario restaurado con éxito con su ID original!", "success");
            document.getElementById("customDocId").value = "";
            document.getElementById("documentData").value = "";
            cargarColeccion(coleccionActual);
        } catch (error) {
            alert("Error en el formato JSON o en Firebase: " + error.message);
        }
    });

    // Cargar registros editables
    async function cargarColeccion(nombreColeccion) {
        const tableBody = document.getElementById("tableBody");
        try {
            const querySnapshot = await getDocs(collection(db, nombreColeccion));
            tableBody.innerHTML = "";
            
            if (querySnapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="3" class="no-data">La colección "${nombreColeccion}" está vacía en este momento.</td></tr>`;
                return;
            }

            querySnapshot.forEach((documento) => {
                const idDoc = documento.id;
                const datosDoc = documento.data();
                
                const fila = document.createElement("tr");

                // ID Fijo (No modificable para no romper la base de datos)
                const tdId = document.createElement("td");
                tdId.innerHTML = `<code style="background:#eee; padding:4px; border-radius:4px;">${idDoc}</code>`;
                fila.appendChild(tdId);

                // Cuadro de texto plano para los datos
                const tdDatos = document.createElement("td");
                const textarea = document.createElement("textarea");
                textarea.className = "row-input";
                textarea.value = JSON.stringify(datosDoc, null, 2);
                textarea.id = `input-${idDoc}`;
                tdDatos.appendChild(textarea);
                fila.appendChild(tdDatos);

                // Acciones
                const tdAcciones = document.createElement("td");
                
                const btnActualizar = document.createElement("button");
                btnActualizar.className = "btn-table-save";
                btnActualizar.innerText = "Actualizar";
                btnActualizar.onclick = () => actualizarRegistro(idDoc);
                
                const btnEliminar = document.createElement("button");
                btnEliminar.className = "btn-table-delete";
                btnEliminar.innerText = "Eliminar";
                btnEliminar.onclick = () => eliminarRegistro(idDoc);

                tdAcciones.appendChild(btnActualizar);
                tdAcciones.appendChild(btnEliminar);
                fila.appendChild(tdAcciones);

                tableBody.appendChild(fila);
            });
            updateStatus(`Editando colección: "${nombreColeccion}"`, "success");
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="3" class="no-data">Error de permisos o base de datos no configurada.</td></tr>`;
            updateStatus("Error: " + error.message, "error");
        }
    }

    // ACTUALIZAR REGISTRO MODIFICADO
    async function actualizarRegistro(idDoc) {
        const textoModificado = document.getElementById(`input-${idDoc}`).value;
        try {
            const objetoLimpio = JSON.parse(textoModificado);
            updateStatus("Guardando cambios...", "loading");
